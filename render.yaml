services:
  - type: web
    name: EmailTrackingServer-V2
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: EmailTrackingServer-V2
      - key: APP_ENV
        value: production
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: INFO
      - key: DATA_FOLDER
        value: /opt/render/project/src/data
      - key: EXPECTED_DATABASE_NAME
        value: email_tracking_v2
      - key: DATABASE_URL
        sync: false
    disk:
      name: tracking-data-v2
      mountPath: /opt/render/project/src/data
      sizeGB: 1
